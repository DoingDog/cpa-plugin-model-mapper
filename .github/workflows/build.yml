name: build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      run_smoke:
        description: Run smoke checks
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
      - run: go test ./...
      - run: go vet ./...

  build-package:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: windows-latest
            output: dist/windows_amd64/model-mapper.dll
            build: CGO_ENABLED=1 GOOS=windows GOARCH=amd64 go build -buildmode=c-shared -o dist/windows_amd64/model-mapper.dll .
          - os: ubuntu-latest
            artifact: ubuntu-latest
            output: dist/linux_amd64/model-mapper.so
            build: CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -buildmode=c-shared -o dist/linux_amd64/model-mapper.so .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
      - shell: bash
        run: mkdir -p "$(dirname '${{ matrix.output }}')"
      - shell: bash
        run: ${{ matrix.build }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/**

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: go run .github/scripts/package-release.go -version "${GITHUB_REF_NAME#v}" -dist dist -out dist/release
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            dist/release/*.zip
            dist/release/*.sha256
